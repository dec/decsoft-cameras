<!doctype html>
<html lang="en">
 <head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DecSoft Cameras - Sample</title>
  <link rel="stylesheet" type="text/css" href="index.css">
 </head>
 <body class="p-5">
  <div id="devices-container" class="container text-center">
   <button id="get-devices-button" class="btn btn-secondary">Initialize devices</button>
  </div>
  <div id="devices-stuff-container" class="container d-none text-center">
   <form>
    <div class="row g-2">
     <div class="col-md-6">
      <div>
       <label class="form-label" for="cameras-select">Select camera:</label>
       <select id="cameras-select" class="form-select"></select>
      </div>
     </div>
     <div class="col-md-6">
      <div>
       <label class="form-label" for="microphones-select">Select microphone:</label>
       <select id="microphones-select" class="form-select">
        <option value="">None</option>
       </select>
      </div>
     </div>
    </div>
    <div id="video-camera-container" class="mt-3 d-none">
     <video id="video-camera" class="ratio ratio-4x3" playsinline autoplay muted></video>
    </div>
    <div class="d-grid gap-2 d-md-block mt-3">
     <button type="button" class="btn btn-secondary" id="start-camera-button">(Re)Start Camera</button>
     <button type="button" class="btn btn-secondary" id="pause-camera-button" disabled>Pause Camera</button>
     <button type="button" class="btn btn-secondary" id="resume-camera-button" disabled>Resume Camera</button>
     <button type="button" class="btn btn-secondary" id="stop-camera-button" disabled>Stop Camera</button>
     <button type="button" class="btn btn-secondary" id="capture-base64-button" disabled>Get capture (Base64)</button>
     <button type="button" class="btn btn-secondary" id="capture-blob-button" disabled>Get capture (Blob)</button>
     <button type="button" class="btn btn-danger" id="start-recording-button" disabled>Start recording</button>
     <button type="button" class="btn btn-secondary" id="stop-recording-button" disabled>Stop recording</button>
    </div>
    <div class="mt-4" id="captured-image-container">
     <img id="captured-image" class="img-fluid">
    </div>
    <div class="row g-4 mt-4">
     <div class="col-md-3">
      <div>
       <label class="form-label" for="zoom-range-input">Zoom:</label>
       <input id="zoom-range-input" type="range" class="form-range" disabled>
      </div>
      <div>
       <label class="form-label" for="tilt-range-input">Tilt:</label>
       <input id="tilt-range-input" type="range" class="form-range" disabled>
      </div>
      <div>
       <label class="form-label" for="pan-range-input">Pan:</label>
       <input id="pan-range-input" type="range" class="form-range" disabled>
      </div>
      <div>
       <label class="form-label" for="frame-rate-range-input">Frame rate:</label>
       <input id="frame-rate-range-input" type="range" class="form-range" disabled>
      </div>
      <div>
       <label class="form-label" for="brightness-range-input">Brightness:</label>
       <input id="brightness-range-input" type="range" class="form-range" disabled>
      </div>
     </div>
     <div class="col-md-3">
      <div>
       <label class="form-label" for="contrast-range-input">Contrast:</label>
       <input id="contrast-range-input" type="range" class="form-range" disabled>
      </div>
      <div>
       <label class="form-label" for="color-temperature-range-input">Color temperature:</label>
       <input id="color-temperature-range-input" type="range" class="form-range" disabled>
      </div>
      <div>
       <label class="form-label" for="saturation-range-input">Saturation:</label>
       <input id="saturation-range-input" type="range" class="form-range" disabled>
      </div>
      <div>
       <label class="form-label" for="sharpness-range-input">Sharpness:</label>
       <input id="sharpness-range-input" type="range" class="form-range" disabled>
      </div>
      <div>
       <label class="form-label" for="exposure-time-range-input">Exposure time:</label>
       <input id="exposure-time-range-input" type="range" class="form-range" disabled>
      </div>
     </div>
     <div class="col-md-3">
      <div>
       <label for="exposure-mode-select" class="form-label">Exposure mode:</label>
       <select id="exposure-mode-select" class="form-select" disabled></select>
      </div>
      <div class="mt-2">
       <label for="resize-mode-select" class="form-label">Resize mode:</label>
       <select id="resize-mode-select" class="form-select" disabled></select>
      </div>
      <div class="mt-2">
       <label for="white-balance-mode-select" class="form-label">White balance mode:</label>
       <select id="white-balance-mode-select" class="form-select" disabled></select>
      </div>
     </div>
     <div class="col-md-3">
      <div class="form-check form-switch text-start">
       <input class="form-check-input" type="checkbox" role="switch" id="echo-cancellation-switch" disabled>
       <label class="form-check-label" for="echo-cancellation-switch">Echo cancellation</label>
      </div>
      <div class="form-check form-switch text-start">
       <input class="form-check-input" type="checkbox" role="switch" id="noise-suppression-switch" disabled>
       <label class="form-check-label" for="noise-suppression-switch">Noise suppression</label>
      </div>
      <div class="form-check form-switch text-start">
       <input class="form-check-input" type="checkbox" role="switch" id="auto-gain-control-switch" disabled>
       <label class="form-check-label" for="auto-gain-control-switch">Auto gain control</label>
      </div>
     </div>
    </div>
   </form>
  </div>
  <script src="decsoft-cameras/decsoft-cameras.js"></script>
  <script src="index.js"></script>
  </body>
</html>
